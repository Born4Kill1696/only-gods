<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Only么Gods | Admin Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="admin-panel glass-panel">
            <h2>🔐 Admin Control</h2>
            
            <div id="login-form">
                <input type="password" id="admin-pass" placeholder="Enter Admin Password" autocomplete="off">
                <button id="login-btn">Unlock Dashboard</button>
                <p id="login-error" class="error hidden">Incorrect Password</p>
            </div>
            
            <div id="admin-dashboard" class="hidden">
                <div class="form-group">
                    <label for="event-name-input">Event Name</label>
                    <input type="text" id="event-name-input" placeholder="e.g. Weekly Clan Scrims #12">
                </div>
                
                <div class="form-group">
                    <label for="event-date-input">Event Date</label>
                    <input type="date" id="event-date-input">
                </div>
                
                <div class="form-group">
                    <label for="event-time-input">Event Time</label>
                    <input type="time" id="event-time-input">
                </div>
                
                <button id="save-event-btn">💾 Save Event</button>
                <p id="save-success" class="success hidden">Event Updated Successfully!</p>
                <a href="index.html" class="back-link">← Back to Public Page</a>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
